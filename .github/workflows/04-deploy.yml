# This workflow completes the story by delivering the saved package.
# It starts after the build workflow finishes successfully.
name: 04 Deploy Workflow

on:
  workflow_dispatch: 
env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: actions/lab
  IMAGE_TAG: ${{ github.run_id }}

permissions:
  # Read access is enough because this workflow only downloads artifacts and reads repo data.
  actions: read
  contents: read
  id-token: write

jobs:
  deploy-package:
    # Use a fresh runner for the deployment simulation.
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh

          # Write private key
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

          # Add EC2 host to known_hosts (prevents interactive prompt)
          ssh-keyscan -H ${{ vars.EC2_IP }} >> ~/.ssh/known_hosts
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: SSH into EC2
        run: |
          ssh -i ~/.ssh/ec2_key ubuntu@${{ vars.EC2_IP }} \
          "echo Connected && whoami && hostname" 
      
   

